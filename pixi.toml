[workspace]
authors = ["Tien Chueh Wang <f74169@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "miniaudio-mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "pixi run build-native-lib && mojo run -I src/api -I src/ffi -I tests main.mojo"
run-mojo-quickstart = "pixi run run-ffi"

# --- Layered rebinding (thin shim + std.testing TDD). See docs/binding-architecture.md ---
build-shim = "mkdir -p build && cc -O2 -fPIC -shared -o build/libma_shim.so src/native/ma_shim*.c vendor/miniaudio/miniaudio.c -Ivendor/miniaudio -Isrc/native -lpthread -lm -ldl -latomic"
test-decoder = "pixi run build-shim && pixi run gen-test-wav && mojo run -I src -I tests tests/test_decoder_binding.mojo && mojo run -I src -I tests tests/test_decoder_api.mojo"
test-encoder = "pixi run build-shim && pixi run gen-test-wav && mojo run -I src -I tests tests/test_encoder_binding.mojo && mojo run -I src -I tests tests/test_encoder_api.mojo"
test-device = "pixi run build-shim && pixi run gen-test-wav && mojo run -I src -I tests tests/test_device_binding.mojo && mojo run -I src -I tests tests/test_device_api.mojo"
test-engine = "pixi run build-shim && pixi run gen-test-wav && mojo run -I src -I tests tests/test_engine_binding.mojo && mojo run -I src -I tests tests/test_engine_api.mojo"
test-sound = "pixi run build-shim && pixi run gen-test-wav && mojo run -I src -I tests tests/test_sound_binding.mojo && mojo run -I src -I tests tests/test_sound_api.mojo"
test-sound-group = "pixi run build-shim && pixi run gen-test-wav && mojo run -I src -I tests tests/test_sound_group_binding.mojo && mojo run -I src -I tests tests/test_sound_group_api.mojo"
test = "pixi run test-decoder && pixi run test-encoder && pixi run test-device && pixi run test-engine && pixi run test-sound && pixi run test-sound-group"

# --- Coverage assurance system. See docs/binding-coverage.md ---
gen-api-inventory = "python3 tools/gen_api_inventory.py"
coverage-binding = "python3 tools/check_binding_coverage.py"
coverage-shim = "bash tools/shim_coverage.sh"
coverage = "pixi run coverage-binding && pixi run coverage-shim"
gate = "pixi run test && pixi run coverage"

build-native-lib = "mkdir -p build && cc -O2 -fPIC -shared -o build/libminiaudio_mojo.so src/native/miniaudio_shim.c vendor/miniaudio/miniaudio.c -Ivendor/miniaudio -lpthread -lm -ldl -latomic"
build-native-smoke = "mkdir -p build && cc -O2 -o build/native_smoke examples/native_smoke.c src/native/miniaudio_shim.c vendor/miniaudio/miniaudio.c -Ivendor/miniaudio -Isrc/native -lpthread -lm -ldl -latomic"
smoke-native = "pixi run build-native-smoke && ./build/native_smoke"
smoke-native-baseline = "pixi run smoke-native"
smoke-native-binding-suite = "pixi run gen-test-wav && pixi run build-native-smoke && MMJ_NATIVE_SKIP_PLAYBACK=1 MMJ_NATIVE_RUN_SUITE=1 ./build/native_smoke"
coverage-native-baseline = "bash tools/native_coverage.sh build/coverage/native"
coverage-native-summary = "bash tools/native_coverage_summary.sh build/coverage/native"
gate-binding-test-first = "pixi run smoke-native-binding-suite && pixi run coverage-native-baseline && pixi run coverage-native-summary"
run-mojo-binding-contract-smoke = "MINIAUDIO_SKIP_BASE_PLAYBACK_SMOKE=1 MINIAUDIO_BINDING_CONTRACT_SMOKE=1 pixi run run-ffi"
run-mojo-handle-lifecycle-contract-smoke = "MINIAUDIO_SKIP_BASE_PLAYBACK_SMOKE=1 MINIAUDIO_HANDLE_LIFECYCLE_CONTRACT_SMOKE=1 pixi run run-ffi"
run-mojo-device-init-ex-contract-suite = "MINIAUDIO_SKIP_BASE_PLAYBACK_SMOKE=1 MINIAUDIO_DEVICE_INIT_EX_CONTRACT_SUITE=1 pixi run run-ffi"
run-mojo-decoder-encoder-contract-suite = "MINIAUDIO_SKIP_BASE_PLAYBACK_SMOKE=1 MINIAUDIO_DECODER_ENCODER_CONTRACT_SUITE=1 pixi run run-ffi"
run-mojo-binding-suite = "pixi run gen-test-wav && MINIAUDIO_SKIP_BASE_PLAYBACK_SMOKE=1 MINIAUDIO_BINDING_CONTRACT_SMOKE=1 MINIAUDIO_HANDLE_LIFECYCLE_CONTRACT_SMOKE=1 MINIAUDIO_DEVICE_INIT_EX_CONTRACT_SUITE=1 MINIAUDIO_DECODER_ENCODER_CONTRACT_SUITE=1 MINIAUDIO_DECODER_MEMORY_SMOKE=1 MINIAUDIO_DECODER_MEMORY_FORMAT_MATRIX_SMOKE=1 MINIAUDIO_DECODER_MEMORY_INVALID_ARGS_SMOKE=1 MINIAUDIO_JOB_QUEUE_SMOKE=1 MINIAUDIO_JOB_QUEUE_INVALID_ARGS_SMOKE=1 MINIAUDIO_SYNC_PRIMITIVES_SMOKE=1 MINIAUDIO_SYNC_PRIMITIVES_INVALID_ARGS_SMOKE=1 MINIAUDIO_ASYNC_NOTIFICATION_POLL_SMOKE=1 MINIAUDIO_ASYNC_NOTIFICATION_POLL_INVALID_ARGS_SMOKE=1 MINIAUDIO_ASYNC_NOTIFICATION_EVENT_SMOKE=1 MINIAUDIO_ASYNC_NOTIFICATION_EVENT_INVALID_ARGS_SMOKE=1 MINIAUDIO_LOGGING_SMOKE=1 MINIAUDIO_LOGGING_INVALID_SMOKE=1 MINIAUDIO_BIQUAD_PEAKING_EQ_SMOKE=1 MINIAUDIO_BIQUAD_INVALID_Q_SMOKE=1 MINIAUDIO_RESAMPLER_LINEAR_SMOKE=1 MINIAUDIO_RESAMPLER_INVALID_RATE_SMOKE=1 MINIAUDIO_RESAMPLER_EXPECTED_COUNT_SMOKE=1 MINIAUDIO_CHANNEL_CONVERTER_STEREO_MONO_SMOKE=1 MINIAUDIO_CHANNEL_CONVERTER_INVALID_CHANNELS_SMOKE=1 MINIAUDIO_CHANNEL_CONVERTER_INIT_MODE_SMOKE=1 MINIAUDIO_DATA_CONVERTER_SMOKE=1 MINIAUDIO_DATA_CONVERTER_INVALID_ARGS_SMOKE=1 MINIAUDIO_WAVEFORM_SINE_SMOKE=1 MINIAUDIO_WAVEFORM_INVALID_ARGS_SMOKE=1 MINIAUDIO_WAVEFORM_HANDLE_INVALID_SMOKE=1 MINIAUDIO_NOISE_SMOKE=1 MINIAUDIO_NOISE_INVALID_ARGS_SMOKE=1 MINIAUDIO_SPATIALIZER_SMOKE=1 MINIAUDIO_SPATIALIZER_INVALID_ARGS_SMOKE=1 MINIAUDIO_CUSTOM_BUFFER_DATA_SOURCE_SMOKE=1 MINIAUDIO_CUSTOM_BUFFER_DATA_SOURCE_INVALID_ARGS_SMOKE=1 MINIAUDIO_PCM_RB_SMOKE=1 MINIAUDIO_PCM_RB_OVERFLOW_SMOKE=1 MINIAUDIO_PCM_RB_INVALID_ARGS_SMOKE=1 MINIAUDIO_PCM_RB_HANDLE_SMOKE=1 MINIAUDIO_DATA_SOURCE_EXTENDED_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_DATA_SOURCE_RANGE_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_DATA_SOURCE_INVALID_SMOKE=1 MINIAUDIO_DATA_SOURCE_LOOP_POINT_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_RESOURCE_FILE=./build/test_assets/sine_440_ster