[workspace]
authors = ["Tien Chueh Wang <f74169@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "miniaudio-mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "pixi run build-native-lib && mojo run -I src/api -I src/ffi main.mojo"
run-mojo-quickstart = "pixi run run-ffi"
build-native-lib = "mkdir -p build && cc -O2 -fPIC -shared -o build/libminiaudio_mojo.so src/native/miniaudio_shim.c vendor/miniaudio/miniaudio.c -Ivendor/miniaudio -lpthread -lm -ldl -latomic"
build-native-smoke = "mkdir -p build && cc -O2 -o build/native_smoke examples/native_smoke.c src/native/miniaudio_shim.c vendor/miniaudio/miniaudio.c -Ivendor/miniaudio -Isrc/native -lpthread -lm -ldl -latomic"
smoke-native = "pixi run build-native-smoke && ./build/native_smoke"
smoke-native-baseline = "pixi run smoke-native"
run-ffi = "pixi run build-native-lib && mojo run -I src/api -I src/ffi main.mojo"
run-context-smoke = "MINIAUDIO_CONTEXT_SMOKE=1 pixi run run-ffi"
run-capture-smoke = "MINIAUDIO_CAPTURE_SMOKE=1 pixi run run-ffi"
run-capture-file-smoke-success = "mkdir -p build/test_assets && rm -f ./build/test_assets/capture_smoke.wav && MINIAUDIO_CAPTURE_FILE=./build/test_assets/capture_smoke.wav pixi run run-ffi"
run-capture-file-smoke-missing = "MINIAUDIO_CAPTURE_FILE=/tmp/does-not-exist/capture_smoke.wav pixi run run-ffi"
run-encoder-wav-smoke-success = "mkdir -p build/test_assets && rm -f ./build/test_assets/encoder_silence.wav && MINIAUDIO_ENCODER_WAV_FILE=./build/test_assets/encoder_silence.wav pixi run run-ffi"
run-encoder-wav-smoke-missing = "MINIAUDIO_ENCODER_WAV_FILE=/tmp/does-not-exist/encoder_silence.wav pixi run run-ffi"
run-duplex-smoke = "MINIAUDIO_DUPLEX_SMOKE=1 pixi run run-ffi"
run-duplex-control-smoke = "MINIAUDIO_DUPLEX_CONTROL_SMOKE=1 pixi run run-ffi"
run-devices-smoke = "MINIAUDIO_DEVICES_SMOKE=1 pixi run run-ffi"
run-device-select-smoke = "MINIAUDIO_DEVICE_SELECT_SMOKE=1 pixi run run-ffi"
run-device-control-smoke = "MINIAUDIO_DEVICE_CONTROL_SMOKE=1 pixi run run-ffi"
run-device-volume-smoke = "MINIAUDIO_DEVICE_VOLUME_SMOKE=1 pixi run run-ffi"
run-device-config-smoke = "MINIAUDIO_DEVICE_CONFIG_SMOKE=1 pixi run run-ffi"
run-device-callback-smoke = "MINIAUDIO_DEVICE_CALLBACK_SMOKE=1 pixi run run-ffi"
run-device-callback-longrun-smoke-quick = "MINIAUDIO_DEVICE_CALLBACK_LONGRUN_SMOKE=1 MINIAUDIO_DEVICE_CALLBACK_LONGRUN_MS=30000 pixi run run-ffi"
run-device-callback-longrun-smoke = "MINIAUDIO_DEVICE_CALLBACK_LONGRUN_SMOKE=1 MINIAUDIO_DEVICE_CALLBACK_LONGRUN_MS=600000 pixi run run-ffi"
gen-test-wav = "python3 tools/gen_test_wav.py"
run-decoder-smoke-success = "pixi run gen-test-wav && MINIAUDIO_DECODER_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-decoder-smoke-missing = "MINIAUDIO_DECODER_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-decoder-read-smoke-success = "pixi run gen-test-wav && MINIAUDIO_DECODER_READ_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-decoder-read-smoke-missing = "MINIAUDIO_DECODER_READ_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-playback-file-smoke-success = "pixi run gen-test-wav && MINIAUDIO_PLAYBACK_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-playback-file-smoke-missing = "MINIAUDIO_PLAYBACK_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-engine-play-smoke-success = "pixi run gen-test-wav && MINIAUDIO_ENGINE_PLAY_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-engine-play-smoke-missing = "MINIAUDIO_ENGINE_PLAY_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-engine-listener-smoke = "MINIAUDIO_ENGINE_LISTENER_SMOKE=1 pixi run run-ffi"
run-sound-control-smoke-success = "pixi run gen-test-wav && MINIAUDIO_SOUND_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-sound-control-smoke-missing = "MINIAUDIO_SOUND_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-sound-spatial-smoke-success = "pixi run gen-test-wav && MINIAUDIO_SOUND_SPATIAL_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-sound-spatial-smoke-missing = "MINIAUDIO_SOUND_SPATIAL_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-sound-progress-smoke-success = "pixi run gen-test-wav && MINIAUDIO_SOUND_PROGRESS_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-sound-progress-smoke-missing = "MINIAUDIO_SOUND_PROGRESS_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-spatial-scene-smoke-success = "pixi run gen-test-wav && MINIAUDIO_SPATIAL_SCENE_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-spatial-scene-smoke-missing = "MINIAUDIO_SPATIAL_SCENE_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-node-attach-smoke-success = "pixi run gen-test-wav && MINIAUDIO_NODE_ATTACH_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-node-attach-smoke-missing = "MINIAUDIO_NODE_ATTACH_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-node-routing-smoke-success = "pixi run gen-test-wav && MINIAUDIO_NODE_ROUTING_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-node-routing-smoke-missing = "MINIAUDIO_NODE_ROUTING_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-lpf-node-smoke-success = "pixi run gen-test-wav && MINIAUDIO_LPF_NODE_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-lpf-node-smoke-missing = "MINIAUDIO_LPF_NODE_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-hpf-node-smoke-success = "pixi run gen-test-wav && MINIAUDIO_HPF_NODE_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-hpf-node-smoke-missing = "MINIAUDIO_HPF_NODE_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-reverb-like-chain-smoke-success = "pixi run gen-test-wav && MINIAUDIO_REVERB_LIKE_CHAIN_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-reverb-like-chain-smoke-missing = "MINIAUDIO_REVERB_LIKE_CHAIN_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-splitter-smoke-success = "pixi run gen-test-wav && MINIAUDIO_SPLITTER_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-splitter-smoke-missing = "MINIAUDIO_SPLITTER_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-resource-manager-smoke-success = "pixi run gen-test-wav && MINIAUDIO_RESOURCE_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-resource-manager-smoke-missing = "MINIAUDIO_RESOURCE_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-resource-manager-async-smoke-success = "pixi run gen-test-wav && MINIAUDIO_RESOURCE_ASYNC_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"
run-resource-manager-async-smoke-missing = "MINIAUDIO_RESOURCE_ASYNC_FILE=/tmp/does-not-exist.wav pixi run run-ffi"
run-all-smokes = "pixi run gen-test-wav && MINIAUDIO_CONTEXT_SMOKE=1 MINIAUDIO_CAPTURE_SMOKE=1 MINIAUDIO_DUPLEX_SMOKE=1 MINIAUDIO_DUPLEX_CONTROL_SMOKE=1 MINIAUDIO_DEVICES_SMOKE=1 MINIAUDIO_DEVICE_SELECT_SMOKE=1 MINIAUDIO_DEVICE_CONTROL_SMOKE=1 MINIAUDIO_DEVICE_VOLUME_SMOKE=1 MINIAUDIO_DEVICE_CONFIG_SMOKE=1 MINIAUDIO_DEVICE_CALLBACK_SMOKE=1 MINIAUDIO_DEVICE_CALLBACK_LONGRUN_SMOKE=1 MINIAUDIO_DEVICE_CALLBACK_LONGRUN_MS=30000 MINIAUDIO_CAPTURE_FILE=./build/test_assets/capture_smoke.wav MINIAUDIO_ENCODER_WAV_FILE=./build/test_assets/encoder_silence.wav MINIAUDIO_ENGINE_PLAY_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_ENGINE_LISTENER_SMOKE=1 MINIAUDIO_SOUND_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_SOUND_SPATIAL_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_SOUND_PROGRESS_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_SPATIAL_SCENE_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_NODE_ATTACH_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_NODE_ROUTING_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_LPF_NODE_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_HPF_NODE_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_REVERB_LIKE_CHAIN_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_SPLITTER_FILE=./build/test_assets/sine_440_stereo.wav MINIAUDIO_RESOURCE_FILE=./build/test_assets/sine_440_stereo.wav pixi run run-ffi"

[dependencies]
mojo = ">=1.0.0b2.dev2026051106,<2"
